<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Cutie 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --blue: #5bc8f5;
    --blue-light: #a8e6f8;
    --blue-dark: #1a7fb5;
    --white: #ffffff;
    --cream: #e0f7ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Caveat', cursive;
    overflow: hidden;
    position: relative;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
  }
  @keyframes twinkle { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }

  .page-title {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-bottom: 36px;
    font-family: 'Permanent Marker', cursive;
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    color: var(--blue);
    line-height: 1.15;
    text-shadow: 0 0 30px rgba(91,200,245,0.45);
    animation: fadeSlideIn 1s ease both;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 90vw;
    max-width: 900px;
  }

  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    width: 100%;
  }

  .text-side { display: flex; flex-direction: column; gap: 18px; }

  .subtitle {
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    color: var(--blue-light);
    animation: fadeSlideIn 1s 0.3s ease both;
  }

  .love-note {
    font-size: clamp(1.1rem, 2vw, 1.6rem);
    color: rgba(160,220,248,0.7);
    margin-top: 6px;
    font-style: italic;
    animation: fadeSlideIn 1s 0.6s ease both;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cake-side {
    flex-shrink: 0;
    position: relative;
    cursor: pointer;
    animation: fadeSlideIn 1s 0.5s ease both;
  }
  .cake-side:hover .cake-glow { opacity: 0.6; }

  .cake-glow {
    position: absolute;
    inset: -30px;
    background: radial-gradient(ellipse, rgba(91,200,245,0.25) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.3;
    transition: opacity 0.3s;
  }

  canvas#cake { width: 220px; height: 220px; image-rendering: pixelated; }

  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(91,200,245,0.35);
    transform: scale(0);
    animation: rippleOut 0.6s ease-out forwards;
    pointer-events: none;
  }
  @keyframes rippleOut { to { transform: scale(4); opacity: 0; } }

  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    top: -20px;
    border-radius: 2px;
    animation: confettiFall var(--duration, 2.5s) linear forwards;
    pointer-events: none;
    z-index: 999;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .blown-message {
    position: fixed;
    bottom: 10%;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .blown-message.show { opacity: 1; }
  .blown-message span {
    font-family: 'Permanent Marker', cursive;
    font-size: clamp(2rem, 6vw, 5rem);
    color: var(--blue);
    text-shadow: 0 0 40px rgba(91,200,245,0.8);
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .smoke {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: rgba(200,230,255,0.6);
    pointer-events: none;
    animation: smokeRise 1.5s ease-out forwards;
  }
  @keyframes smokeRise {
    0%   { transform: translateY(0) scale(1); opacity: 0.7; }
    100% { transform: translateY(-80px) scale(3); opacity: 0; }
  }

  .hint-arrow {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.4rem;
    color: var(--blue);
    animation: bounce 1.2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-8px); }
  }

  @media (max-width: 620px) {
    .bottom-row { flex-direction: column; align-items: center; text-align: center; gap: 30px; }
    .hint-arrow { bottom: -24px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="page-title">Happy Birthday Handsome!&nbsp;:)</div>

<div class="container">
  <div class="bottom-row">
    <div class="text-side">
      <div class="subtitle">Click the cake and blow your candle</div>
      <div class="love-note">Enjoy your day my sweet Brice &#9825;</div>
    </div>
    <div class="cake-side" id="cakeSide">
      <div class="cake-glow"></div>
      <canvas id="cake" width="44" height="44"></canvas>
      <div class="hint-arrow">👆</div>
    </div>
  </div>
</div>

<div class="blown-message" id="blownMsg">
  <span>🎉 Make a Wish! 🎉</span>
</div>

<script>
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random()*100 + '%';
  s.style.top  = Math.random()*100 + '%';
  s.style.setProperty('--d', (2 + Math.random()*4) + 's');
  s.style.animationDelay = (Math.random()*4) + 's';
  starsEl.appendChild(s);
}

const canvas = document.getElementById('cake');
const ctx = canvas.getContext('2d');

// Colors — light blues and whites
const O = '#5bc8f5'; // sky blue
const P = '#a8e6f8'; // light blue
const D = '#1a7fb5'; // dark blue
const W = '#ffffff'; // white frosting
const _ = null;      // transparent
const F = '#00cfff'; // flame cyan
const Y = '#e0f7ff'; // flame white-blue
const C = '#cceeff'; // candle light blue

function drawCake(candleOn) {
  ctx.clearRect(0, 0, 44, 44);
  const px = (x, y, color) => { if (!color) return; ctx.fillStyle = color; ctx.fillRect(x, y, 1, 1); };

  // Candle
  for (let row = 5; row <= 13; row++) { px(20, row, C); px(21, row, C); px(22, row, C); }
  for (let row = 6; row <= 12; row += 3) { px(20, row, O); px(21, row, O); px(22, row, O); }

  if (candleOn) {
    px(21, 1, Y); px(20, 2, F); px(21, 2, Y); px(22, 2, F);
    px(20, 3, F); px(21, 3, Y); px(22, 3, F);
    px(21, 4, F); px(20, 4, F); px(22, 4, F);
    ctx.fillStyle = 'rgba(0,200,255,0.18)'; ctx.fillRect(17, 0, 9, 7);
  }
  px(21, candleOn ? 5 : 3, '#336688');

  // Top tier
  for (let col = 14; col <= 30; col++) {
    if ((col % 3) === 0) px(col, 14, W);
    for (let row = 15; row <= 20; row++) px(col, row, (col===14||col===30) ? D : ((row===15||row===20) ? P : O));
  }
  for (let col = 14; col <= 30; col++) px(col, 15, W);
  for (let col = 16; col <= 28; col += 4) px(col, 18, Y);

  // Middle tier
  for (let col = 8; col <= 36; col++) {
    if ((col % 4) === 0) px(col, 21, W);
    for (let row = 22; row <= 29; row++) px(col, row, (col===8||col===36) ? D : ((row===22||row===29) ? P : O));
  }
  for (let col = 8; col <= 36; col++) px(col, 22, W);
  for (let col = 10; col <= 34; col += 5) px(col, 26, Y);

  // Bottom tier
  for (let col = 4; col <= 40; col++) {
    if ((col % 3) === 1) px(col, 30, W);
    for (let row = 31; row <= 40; row++) px(col, row, (col===4||col===40) ? D : ((row===31||row===40) ? P : O));
  }
  for (let col = 4; col <= 40; col++) px(col, 31, W);
  for (let col = 6; col <= 38; col += 6) { px(col, 36, Y); px(col, 37, W); }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(6, 41, 34, 2);
}

let candleOn = true, blown = false;
drawCake(true);

document.getElementById('cakeSide').addEventListener('click', function(e) {
  if (blown) return;
  blown = true;
  const rect = this.getBoundingClientRect();
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.width = r.style.height = '60px';
  r.style.left = (e.clientX - rect.left - 30) + 'px';
  r.style.top  = (e.clientY - rect.top - 30) + 'px';
  this.appendChild(r);
  setTimeout(() => r.remove(), 700);

  let flickers = 0;
  const flicker = setInterval(() => {
    candleOn = !candleOn; drawCake(candleOn); flickers++;
    if (flickers >= 6) {
      clearInterval(flicker); candleOn = false; drawCake(false);
      const rect2 = canvas.getBoundingClientRect();
      for (let i = 0; i < 5; i++) setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'smoke';
        s.style.left = (rect2.left + rect2.width/2 - 6 + (Math.random()-0.5)*20) + 'px';
        s.style.top = (rect2.top + 20) + 'px';
        s.style.animationDelay = (i*0.1) + 's';
        document.body.appendChild(s); setTimeout(() => s.remove(), 1800);
      }, i * 80);

      setTimeout(() => document.getElementById('blownMsg').classList.add('show'), 400);

      // Blue-toned confetti
      const colors = ['#5bc8f5','#a8e6f8','#ffffff','#00cfff','#e0f7ff','#1a7fb5','#cceeff'];
      for (let i = 0; i < 80; i++) setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random()*100 + 'vw';
        c.style.background = colors[Math.floor(Math.random()*colors.length)];
        c.style.setProperty('--duration', (1.8 + Math.random()*2) + 's');
        c.style.animationDelay = (Math.random()*0.8) + 's';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.width = (6 + Math.random()*10) + 'px';
        c.style.height = (6 + Math.random()*10) + 'px';
        document.body.appendChild(c); setTimeout(() => c.remove(), 4000);
      }, i * 30);
    }
  }, 80);
});

// Ambient candle flicker
setInterval(() => {
  if (!candleOn || blown) return;
  ctx.clearRect(17, 0, 9, 7);
  ctx.fillStyle = `rgba(0,${180 + Math.random()*60|0},255,0.18)`; ctx.fillRect(17, 0, 9, 7);
  ctx.fillStyle = Math.random()>0.5 ? '#e0f7ff' : '#00cfff';
  ctx.fillRect(21, 1, 1, 1); ctx.fillRect(20, 2, 3, 1); ctx.fillRect(20, 3, 3, 1); ctx.fillRect(20, 4, 3, 1);
}, 120);
</script>
</body>
</html>
